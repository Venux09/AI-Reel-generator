<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AIVidCodex{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Raleway:wght@300;400;500;600&family=Orbitron:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    {% block extra_css %}{% endblock %}
</head>
<body>

    <!-- Animated starfield canvas -->
    <canvas id="starfield"></canvas>

    <nav class="navbar">
        <div class="nav-container">
            <a class="navbar-brand" href="/">
                <span class="brand-icon">✦</span>
                AIVidCodex
            </a>
            <button class="nav-toggle" id="navToggle">
                <span></span><span></span><span></span>
            </button>
            <ul class="nav-links" id="navLinks">
                <li><a class="nav-link" href="/">Home</a></li>
                <li><a class="nav-link" href="/create">Create</a></li>
                <li><a class="nav-link" href="/gallery">Gallery</a></li>
                <li><a class="nav-link nav-ai" href="/aichat">AI Chat ✦</a></li>
            </ul>
        </div>
    </nav>

    <div class="main-content">
        {% block content %}{% endblock %}
    </div>

    <footer>
        <div class="footer-inner">
            <div class="footer-brand">
                <span class="brand-icon">✦</span> AIVidCodex
                <p>Transform images into cinematic reels with AI</p>
            </div>
            <div class="footer-links">
                <a href="/"><i class="fas fa-home"></i></a>
                <a href="/create"><i class="fas fa-film"></i></a>
                <a href="/gallery"><i class="fas fa-images"></i></a>
                <a href="https://instagram.com/__monu_verma___" target="_blank"><i class="fab fa-instagram"></i></a>
                <a href="https://github.com/venux09" target="_blank"><i class="fab fa-github"></i></a>
            </div>
            <p class="footer-copy">© 2026 AIVidCodex · Built by Monu Verma</p>
        </div>
    </footer>

    <script>
    // Starfield animation
    const canvas = document.getElementById('starfield');
    const ctx = canvas.getContext('2d');
    let stars = [];

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }

    function initStars() {
        stars = [];
        for (let i = 0; i < 160; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                r: Math.random() * 1.8 + 0.2,
                speed: Math.random() * 0.3 + 0.05,
                opacity: Math.random() * 0.7 + 0.3,
                twinkle: Math.random() * Math.PI * 2
            });
        }
    }

    function drawStars() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        stars.forEach(s => {
            s.twinkle += 0.02;
            s.opacity = 0.3 + Math.abs(Math.sin(s.twinkle)) * 0.7;
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255,255,255,${s.opacity})`;
            ctx.fill();
            // soft glow
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.r * 2.5, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(120,180,255,${s.opacity * 0.15})`;
            ctx.fill();
            s.y -= s.speed;
            if (s.y < -2) { s.y = canvas.height; s.x = Math.random() * canvas.width; }
        });
        requestAnimationFrame(drawStars);
    }

    resize();
    initStars();
    drawStars();
    window.addEventListener('resize', () => { resize(); initStars(); });

    // Nav toggle mobile
    document.getElementById('navToggle').addEventListener('click', () => {
        document.getElementById('navLinks').classList.toggle('open');
    });
    </script>

    {% block extra_js %}{% endblock %}
</body>
</html>
